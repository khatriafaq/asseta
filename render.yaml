services:
  - type: web
    name: asseta-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      # Set this in the Render dashboard — copy from Supabase > Project Settings > Database
      # Use the Session Pooler URL (port 5432) with ?sslmode=require appended
      - key: DATABASE_URL
        sync: false

      # Auto-generated by Render — a cryptographically random secret
      - key: SECRET_KEY
        generateValue: true

      # Your Vercel frontend URL — update after first Vercel deploy
      - key: CORS_ORIGINS
        value: https://asseta.vercel.app

      # Optional: Google Gemini API key for AI insights
      # - key: GEMINI_API_KEY
      #   sync: false
