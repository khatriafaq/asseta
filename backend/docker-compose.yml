# Backend-only compose — useful for running just the API + infra
# For the full stack, use the root docker-compose.yml instead:
#   cd .. && docker compose up

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: asseta
      POSTGRES_PASSWORD: asseta
      POSTGRES_DB: asseta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asseta"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://asseta:asseta@db:5432/asseta
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  pgdata:
