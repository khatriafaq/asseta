name: Deploy to Production

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

jobs:
  # ── Backend: lint + test ───────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: asseta
          POSTGRES_PASSWORD: asseta
          POSTGRES_DB: asseta_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://asseta:asseta@localhost:5432/asseta_test
      SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ── Frontend: lint + build check ──────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: https://asseta-api.onrender.com/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Deploy backend to Render ───────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Render deploy triggered."

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: frontend
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
